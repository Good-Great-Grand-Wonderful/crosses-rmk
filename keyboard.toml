[keyboard]
name = "Crosses"
product_name = "Crosses"
vendor_id = 0x4c4b
product_id = 0x4643
manufacturer = "Good Great Grand Wonderful"
chip = "rp2040"

[layout]
rows = 5
cols = 12
layers = 1
matrix_map = """
 (0, 0, L)  (0, 1, L)  (0, 2, L)  (0, 3, L)  (0, 4, L) (0, 5, L)    (0, 6, R)  (0, 7, R)  (0, 8, R)  (0, 9, R) (0, 10, R) (0, 11, R)
 (1, 0, L)  (1, 1, L)  (1, 2, L)  (1, 3, L)  (1, 4, L) (1, 5, L)    (1, 6, R)  (1, 7, R)  (1, 8, R)  (1, 9, R) (1, 10, R) (1, 11, R)
 (2, 0, L)  (2, 1, L)  (2, 2, L)  (2, 3, L)  (2, 4, L) (2, 5, L)    (2, 6, R)  (2, 7, R)  (2, 8, R)  (2, 9, R) (2, 10, R) (2, 11, R)
 (3, 0, L)  (3, 1, L)  (3, 2, L)  (3, 3, L)  (3, 4, L) (3, 5, L)    (3, 6, R)  (3, 7, R)  (3, 8, R)  (3, 9, R) (3, 10, R) (3, 11, R)
                                  (4, 3, L)  (4, 4, L) (4, 5, L)    (4, 6, R)  (4, 7, R)  (4, 8, R)
"""

[[layer]]
name = "base_layer"
keys = """
Grave  1    2     3     4     5           6     7     8     9     0          Delete
Tab    Q    W     E     R     T           Y     U     I     O     P          Backspace
LCtrl  A    S     D     F     G           H     J     K     L     SemiColon  Quote
LShift Z    X     C     V     B           N     M     Comma Dot   Slash      Escape
                  LGui  Tab   Space       Enter Tab   Ralt
"""

[storage]

[split]
connection = "serial"

[split.central]
rows = 5
cols = 6
row_offset = 0
col_offset = 0
serial = [{ instance = "PIO0", tx_pin = "PIN_4", rx_pin = "PIN_4" }]
[split.central.matrix]
matrix_type = "normal"
row_pins = ["PIN_5", "PIN_27", "PIN_28", "PIN_29", "PIN_7"]
col_pins = ["PIN_1", "PIN_26", "PIN_22", "PIN_21", "PIN_23", "PIN_20"]

[[split.central.input_device.pmw3610]]
name = "trackball0"
spi = { instance = "bitbang0", sck = "PIN_2", mosi = "PIN_0", miso = "PIN_0", cs = "PIN_6" }
motion = "PIN_3"
force_awake = false
smart_mode = true
cpi = 800
invert_x = true
invert_y = true

[[split.peripheral]]
rows = 5
cols = 6
row_offset = 5
col_offset = 6
serial = [{ instance = "PIO0", tx_pin = "PIN_4", rx_pin = "PIN_4" }]
[split.peripheral.matrix]
matrix_type = "normal"
row_pins = ["PIN_5", "PIN_27", "PIN_28", "PIN_29", "PIN_7"]
col_pins = ["PIN_1", "PIN_26", "PIN_22", "PIN_21", "PIN_23", "PIN_20"]

[[split.peripheral.input_device.pmw3610]]
name = "trackball1"
spi = { instance = "bitbang0", sck = "PIN_2", mosi = "PIN_0", miso = "PIN_0", cs = "PIN_6" }
motion = "PIN_3"
force_awake = false
smart_mode = true
cpi = 800
invert_x = true

[rmk]
split_peripherals_num = 1